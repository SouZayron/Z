<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ENIGM4TICO — Visual Maker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep: #07060E;
  --bg-2: #060C3F;
  --bg-3: #07156E;
  --accent: #0A37C7;
  --neon: #4FAAF6;
  --light: #B3D6F4;
  --white: #F2F6FF;
}

*{ margin:0; padding:0; box-sizing:border-box; }

html, body{
  width:100%; height:100%;
  overflow:hidden;
  background: var(--bg-deep);
  font-family:'Poppins', sans-serif;
  color: var(--white);
}

body{
  background:
    radial-gradient(ellipse 60% 50% at 15% 20%, rgba(79,170,246,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 80%, rgba(10,55,199,0.14) 0%, transparent 60%),
    linear-gradient(160deg, var(--bg-deep) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
}

/* ---------- BACKGROUND PARTICLES ---------- */
.bg-particles{
  position:fixed; inset:0;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
}
.bg-particle{
  position:absolute;
  border-radius:50%;
  background: radial-gradient(circle, var(--light) 0%, var(--neon) 55%, transparent 100%);
  opacity:0.55;
  animation: floatUpDash linear infinite;
}
@keyframes floatUpDash{
  0%{ transform:translateY(0); opacity:0; }
  10%{ opacity:0.6; }
  90%{ opacity:0.3; }
  100%{ transform:translateY(-100vh); opacity:0; }
}

/* ---------- APP FRAME ---------- */
.app-frame{
  position:relative;
  width:90vw; height:85vh;
  margin: 7.5vh auto;
  z-index:1;
  display:flex;
  border-radius:28px;
  overflow:hidden;
  background: rgba(10,14,34,0.45);
  border:1px solid rgba(79,170,246,0.22);
  backdrop-filter: blur(22px) saturate(130%);
  -webkit-backdrop-filter: blur(22px) saturate(130%);
  box-shadow:
    0 0 60px rgba(10,55,199,0.25),
    0 0 0 1px rgba(79,170,246,0.06) inset,
    0 30px 80px rgba(0,0,0,0.55);
}

/* side lighting */
.app-frame::before, .app-frame::after{
  content:'';
  position:absolute; top:0; bottom:0; width:18%;
  pointer-events:none; z-index:0;
}
.app-frame::before{
  left:0;
  background: linear-gradient(90deg, rgba(79,170,246,0.14), transparent);
}
.app-frame::after{
  right:0;
  background: linear-gradient(270deg, rgba(10,55,199,0.16), transparent);
}

/* ---------- SIDEBAR ---------- */
.sidebar{
  position:relative;
  z-index:2;
  width:96px;
  flex:0 0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-right:1px solid rgba(79,170,246,0.16);
  background: linear-gradient(180deg, rgba(10,20,60,0.35), rgba(7,6,14,0.15));
}
.sidebar-top{
  display:flex;
  flex-direction:column;
  gap:1.4rem;
}
.nav-icon-btn{
  display:flex; flex-direction:column; align-items:center; gap:0.35rem;
  background:none; border:none; cursor:pointer;
  padding:0.9rem 0.6rem;
  border-radius:18px;
  color: rgba(179,214,244,0.55);
  transition: background .3s ease, color .3s ease, box-shadow .3s ease, transform .3s ease;
}
.nav-icon{ font-size:1.5rem; line-height:1; filter: drop-shadow(0 0 0 transparent); transition: transform .3s ease, filter .3s ease; }
.nav-label{
  font-size:0.62rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
  font-weight:500;
}
.nav-icon-btn:hover{
  color: var(--light);
  transform: translateY(-2px);
}
.nav-icon-btn:hover .nav-icon{ filter: drop-shadow(0 0 8px rgba(79,170,246,0.7)); transform: scale(1.08); }
.nav-icon-btn.active{
  color: var(--white);
  background: linear-gradient(135deg, rgba(10,55,199,0.55), rgba(79,170,246,0.18));
  box-shadow: 0 0 22px rgba(79,170,246,0.45), 0 0 0 1px rgba(79,170,246,0.35) inset;
}
.nav-icon-btn.active .nav-icon{ filter: drop-shadow(0 0 10px rgba(79,170,246,0.9)); }

/* ---------- MODULES ---------- */
.modules{
  position:relative;
  z-index:2;
  flex:1 1 auto;
  overflow:hidden;
}
.module{
  position:absolute; inset:0;
  opacity:0;
  transform: translateY(14px);
  pointer-events:none;
  transition: opacity .3s ease, transform .3s ease;
  overflow:hidden;
}
.module.active{
  opacity:1;
  transform: translateY(0);
  pointer-events:all;
}

/* ---------- HOME MODULE ---------- */
#module-home{
  display:flex; align-items:center; justify-content:center;
}
.home-content{
  text-align:center;
  display:flex; flex-direction:column; align-items:center;
  padding: 2rem;
}
.avatar-wrap{
  position:relative;
  width:clamp(140px, 16vw, 210px);
  height:clamp(140px, 16vw, 210px);
  margin-bottom:1.6rem;
}
.avatar-glow{
  position:absolute; inset:-30%;
  background: radial-gradient(circle, rgba(79,170,246,0.45) 0%, transparent 65%);
  filter: blur(6px);
  animation: pulseGlowDash 3.6s ease-in-out infinite;
}
@keyframes pulseGlowDash{
  0%,100%{ opacity:0.55; transform:scale(1); }
  50%{ opacity:0.95; transform:scale(1.08); }
}
.avatar-ring-svg{
  position:absolute; inset:-8px;
  width:calc(100% + 16px);
  height:calc(100% + 16px);
  overflow:visible;
}
.ring-track{
  fill:none;
  stroke: rgba(179,214,244,0.18);
  stroke-width:2;
}
.ring-trace{
  fill:none;
  stroke: var(--neon);
  stroke-width:3;
  stroke-linecap:round;
  stroke-dasharray: 90 640;
  stroke-dashoffset:0;
  filter: drop-shadow(0 0 6px rgba(79,170,246,0.9)) drop-shadow(0 0 14px rgba(79,170,246,0.6));
  animation: traceMoveDash 3.8s linear infinite;
}
@keyframes traceMoveDash{
  to{ stroke-dashoffset:-730; }
}
.avatar-photo{
  position:relative;
  width:100%; height:100%;
  border-radius:22px;
  object-fit:cover;
  display:block;
  animation: breatheDash 6s ease-in-out infinite;
  box-shadow: 0 0 0 4px rgba(7,6,14,0.6);
}
@keyframes breatheDash{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.025); }
}
.home-name{
  font-size:clamp(1.8rem, 3.2vw, 2.8rem);
  font-weight:800;
  letter-spacing:0.02em;
  color: var(--white);
}
.home-name .letter{
  display:inline-block;
  animation: letterNeonDash 2.6s ease-in-out infinite;
}
@keyframes letterNeonDash{
  0%, 100%{
    color: var(--white);
    text-shadow: 0 0 10px rgba(79,170,246,0.25);
  }
  50%{
    color: var(--neon);
    text-shadow:
      0 0 16px rgba(79,170,246,0.9),
      0 0 32px rgba(79,170,246,0.55),
      0 0 56px rgba(10,55,199,0.35);
  }
}
.home-subtitle{
  margin-top:0.3rem;
  font-size:clamp(0.95rem, 1.4vw, 1.2rem);
  font-weight:500;
  color: var(--neon);
  letter-spacing:0.06em;
}
.home-bio{
  margin-top:1rem;
  font-size:0.9rem;
  font-weight:400;
  color: rgba(179,214,244,0.75);
  letter-spacing:0.03em;
}
.home-bio .dot{ color: var(--neon); margin:0 0.4rem; }
.home-quote{
  margin-top:1.1rem;
  max-width:36ch;
  font-size:0.85rem;
  font-style:italic;
  font-weight:300;
  color: rgba(242,246,255,0.55);
  line-height:1.5;
}
.btn-primary{
  margin-top:1.8rem;
  padding:0.85rem 2.2rem;
  border-radius:999px;
  border:1px solid rgba(79,170,246,0.5);
  background: linear-gradient(135deg, rgba(10,55,199,0.65), rgba(79,170,246,0.25));
  color:var(--white);
  font-family:'Poppins', sans-serif;
  font-weight:600;
  font-size:0.9rem;
  letter-spacing:0.04em;
  cursor:pointer;
  transition: transform .3s ease, box-shadow .3s ease, background .3s ease;
}
.btn-primary:hover{
  transform: translateY(-3px);
  box-shadow: 0 8px 26px rgba(79,170,246,0.4);
  background: linear-gradient(135deg, rgba(10,55,199,0.85), rgba(79,170,246,0.4));
}

/* ---------- SHARED MODULE HEADER ---------- */
.module-inner{
  height:100%;
  padding: clamp(1.6rem, 4vh, 3.2rem) clamp(1.6rem, 4vw, 3.6rem);
  display:flex; flex-direction:column;
}
.module-title{
  font-size:clamp(1.4rem, 2.4vw, 2rem);
  font-weight:700;
  color: var(--white);
  text-shadow: 0 0 16px rgba(79,170,246,0.3);
}
.module-subtitle{
  margin-top:0.4rem;
  font-size:0.85rem;
  font-weight:300;
  color: rgba(179,214,244,0.65);
  letter-spacing:0.02em;
}

/* ---------- FRIENDS GRID ---------- */
.friends-grid{
  margin-top: clamp(1.4rem, 3vh, 2.4rem);
  flex:1 1 auto;
  overflow-y:auto;
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap: clamp(0.9rem, 1.6vw, 1.4rem);
  align-content:start;
  padding-bottom:1rem;
}
.friend-card{
  position:relative;
  padding: 0.6rem 0.4rem;
  text-align:center;
  cursor:default;
  transition: transform .3s ease;
  animation: floatCardDash 5s ease-in-out infinite;
}
.friend-card:nth-child(2n){ animation-delay: -1.6s; }
.friend-card:nth-child(3n){ animation-delay: -3s; }
@keyframes floatCardDash{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-4px); }
}
.friend-card:hover{
  transform: translateY(-6px);
}
.friend-card:hover .friend-ring-trace{
  filter: drop-shadow(0 0 6px rgba(79,170,246,1)) drop-shadow(0 0 16px rgba(79,170,246,0.75));
}
.friend-avatar-wrap{
  position:relative;
  width:84px; height:84px;
  margin:0 auto 0.8rem;
}
.friend-ring-svg{
  position:absolute; inset:-6px;
  width:calc(100% + 12px);
  height:calc(100% + 12px);
  overflow:visible;
}
.friend-ring-track{
  fill:none;
  stroke: rgba(179,214,244,0.18);
  stroke-width:2;
}
.friend-ring-trace{
  fill:none;
  stroke: var(--neon);
  stroke-width:2.5;
  stroke-linecap:round;
  stroke-dasharray: 45 303;
  filter: drop-shadow(0 0 4px rgba(79,170,246,0.9)) drop-shadow(0 0 10px rgba(79,170,246,0.55));
  animation: traceMoveFriend 3.2s linear infinite;
}
@keyframes traceMoveFriend{
  to{ stroke-dashoffset:-348; }
}
.friend-avatar-wrap img{
  position:relative;
  width:100%; height:100%;
  border-radius:18px;
  object-fit:cover;
  display:block;
}
.bff-badge{
  position:absolute; top:-7px; right:-7px;
  width:22px; height:22px;
  border-radius:50%;
  background:#E53950;
  display:flex; align-items:center; justify-content:center;
  font-size:0.7rem;
  color:#fff;
  font-weight:700;
  box-shadow: 0 0 10px rgba(229,57,80,0.85);
  border:2px solid var(--bg-deep);
  z-index:2;
}
.friend-name{
  font-size:0.95rem;
  font-weight:600;
  color: var(--white);
}
.friend-id{
  margin-top:0.2rem;
  font-size:0.72rem;
  font-weight:300;
  color: rgba(179,214,244,0.6);
  letter-spacing:0.03em;
}
.friend-card-empty{
  min-height:132px;
  display:flex; align-items:center; justify-content:center;
  border-style:dashed;
  border-color: rgba(79,170,246,0.25);
  background: rgba(79,170,246,0.03);
}
.friend-card-empty::after{
  content:'+';
  font-size:1.6rem;
  font-weight:300;
  color: rgba(179,214,244,0.35);
}
.friend-card-empty:hover{
  border-color: rgba(79,170,246,0.5);
  box-shadow: none;
  transform:none;
}

/* ---------- GALLERY TABS ---------- */
.module-inner-galeria{ overflow:hidden; }
.gallery-tabs{
  display:flex;
  gap:0.7rem;
  margin-top:1.1rem;
  flex:0 0 auto;
}
.gallery-tab{
  padding:0.55rem 1.4rem;
  border-radius:999px;
  border:1px solid rgba(79,170,246,0.25);
  background: rgba(79,170,246,0.05);
  color: rgba(179,214,244,0.7);
  font-family:'Poppins', sans-serif;
  font-weight:500;
  font-size:0.82rem;
  letter-spacing:0.03em;
  cursor:pointer;
  transition: background .3s ease, color .3s ease, box-shadow .3s ease, border-color .3s ease;
}
.gallery-tab:hover{ color:var(--white); border-color: rgba(79,170,246,0.5); }
.gallery-tab.active{
  color: var(--white);
  background: linear-gradient(135deg, rgba(10,55,199,0.6), rgba(79,170,246,0.25));
  border-color: rgba(79,170,246,0.6);
  box-shadow: 0 0 16px rgba(79,170,246,0.35);
}

.gallery-scroll{
  margin-top: clamp(1.2rem, 2.6vh, 2rem);
  flex:1 1 auto;
  overflow-y:auto;
  padding-right:0.4rem;
}
.gallery-scroll::-webkit-scrollbar{ width:6px; }
.gallery-scroll::-webkit-scrollbar-thumb{ background: rgba(79,170,246,0.4); border-radius:4px; }

.gallery-empty{
  grid-column: 1 / -1;
  text-align:center;
  padding: 2.4rem 0;
  color: rgba(179,214,244,0.5);
  font-size:0.9rem;
  letter-spacing:0.04em;
}

/* ---------- XATSPACE CLIENT CARDS ---------- */
.gallery-grid-dash.is-xatspace{
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
}
.xatspace-card{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  padding:1.1rem 1.3rem;
  border-radius:16px;
  border:1px solid rgba(79,170,246,0.18);
  background: linear-gradient(160deg, rgba(79,170,246,0.08), rgba(6,12,63,0.15));
  backdrop-filter: blur(10px);
  transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease;
}
.xatspace-card:hover{
  transform: translateY(-5px);
  border-color: rgba(79,170,246,0.6);
  box-shadow: 0 12px 28px rgba(10,55,199,0.35), 0 0 20px rgba(79,170,246,0.3);
}
.xatspace-name{
  font-size:0.95rem;
  font-weight:600;
  color: var(--white);
  letter-spacing:0.02em;
}
.xatspace-view{
  flex:0 0 auto;
  padding:0.45rem 1.1rem;
  border-radius:999px;
  border:1px solid rgba(79,170,246,0.5);
  background: linear-gradient(135deg, rgba(10,55,199,0.6), rgba(79,170,246,0.22));
  color: var(--white);
  font-size:0.75rem;
  font-weight:600;
  letter-spacing:0.04em;
  text-decoration:none;
  text-transform:uppercase;
  transition: transform .3s ease, box-shadow .3s ease, background .3s ease;
}
.xatspace-view:hover{
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(79,170,246,0.4);
  background: linear-gradient(135deg, rgba(10,55,199,0.85), rgba(79,170,246,0.4));
}

/* ---------- GALLERY GRID ---------- */
.gallery-grid-dash{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: clamp(0.8rem, 1.4vw, 1.2rem);
}
.gallery-item{
  position:relative;
  aspect-ratio: 4/3;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(79,170,246,0.18);
  cursor:pointer;
  content-visibility:auto;
  contain-intrinsic-size: 220px 165px;
  transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease;
}
.gallery-item img{
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  transition: transform .4s ease, filter .4s ease;
}
.gallery-item::after{
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(180deg, transparent 55%, rgba(6,12,63,0.55) 100%);
  opacity:0.6;
  transition: opacity .3s ease;
}
.gallery-item-label{
  position:absolute; left:8px; bottom:6px; z-index:1;
  font-size:0.68rem;
  font-weight:500;
  letter-spacing:0.03em;
  color: var(--white);
  text-shadow:0 0 6px rgba(0,0,0,0.8);
}
.gallery-item:hover{
  transform: translateY(-6px);
  border-color: rgba(79,170,246,0.7);
  box-shadow: 0 14px 32px rgba(10,55,199,0.4), 0 0 24px rgba(79,170,246,0.35);
}
.gallery-item:hover img{ transform: scale(1.08); filter:brightness(1.05); }

/* ---------- LIGHTBOX ---------- */
.lightbox-dash{
  position:fixed; inset:0; z-index:100;
  background: rgba(3,4,12,0.88);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition: opacity .35s ease;
}
.lightbox-dash.open{ opacity:1; pointer-events:all; }
.lightbox-dash img{
  max-width:88vw; max-height:84vh;
  border-radius:14px;
  box-shadow: 0 0 50px rgba(79,170,246,0.35), 0 0 0 1px rgba(179,214,244,0.2);
  transform: scale(0.96);
  transition: transform .35s ease;
}
.lightbox-dash.open img{ transform: scale(1); }
.lightbox-dash-close{
  position:absolute; top:4%; right:4%;
  width:42px; height:42px;
  border:1px solid rgba(179,214,244,0.35);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; background:rgba(6,12,63,0.5);
  color:var(--light);
  transition: box-shadow .3s ease, transform .3s ease;
}
.lightbox-dash-close:hover{ box-shadow:0 0 16px rgba(79,170,246,0.6); transform: rotate(90deg); }

/* ---------- RESPONSIVE ---------- */
@media (max-width: 1024px){
  .friends-grid{ grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 768px){
  .app-frame{
    width:96vw; height:90vh;
    margin: 5vh auto;
    flex-direction:column;
    border-radius:24px;
  }
  .sidebar{
    order:2;
    width:100%;
    height:76px;
    flex-direction:row;
    border-right:none;
    border-top:1px solid rgba(79,170,246,0.16);
  }
  .sidebar-top{
    flex-direction:row;
    width:100%;
    justify-content:space-around;
  }
  .modules{ order:1; }
  .friends-grid{ grid-template-columns: repeat(2, 1fr); }
  .gallery-grid-dash{ grid-template-columns: repeat(2, 1fr); }
  .home-quote{ max-width:26ch; }
}

@media (prefers-reduced-motion: reduce){
  *{ animation:none !important; transition:none !important; }
}

</style>
</head>
<body>

<div class="bg-particles" id="particles"></div>

<div class="app-frame">

  <aside class="sidebar">
    <div class="sidebar-top">
      <button class="nav-icon-btn active" data-module="home" aria-label="Home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-icon-btn" data-module="friends" aria-label="Friends">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Friends</span>
      </button>
      <button class="nav-icon-btn" data-module="galeria" aria-label="Galeria">
        <span class="nav-icon">🖼</span>
        <span class="nav-label">Galeria</span>
      </button>
    </div>
  </aside>

  <main class="modules">

    <!-- MODULE 1 - HOME -->
    <section class="module active" id="module-home">
      <div class="home-content">
        <div class="avatar-wrap">
          <div class="avatar-glow"></div>
          <svg class="avatar-ring-svg" viewBox="0 0 200 200">
            <rect class="ring-track" x="4" y="4" width="192" height="192" rx="24" ry="24"/>
            <rect class="ring-trace" x="4" y="4" width="192" height="192" rx="24" ry="24"/>
          </svg>
          <img class="avatar-photo" src="https://xatimg.com/image/QdlIhvaGV92j.png" alt="ENIGM4TICO">
        </div>
        <h1 class="home-name">ENIGM4TICO</h1>
        <p class="home-subtitle">Visual Maker</p>
        <p class="home-bio">Xatspace <span class="dot">•</span> Pcbacks <span class="dot">•</span> Fondos</p>
        <p class="home-quote">"Transformando ideias em experiências visuais modernas."</p>
        <button class="btn-primary" id="goGaleria">Ver Galeria</button>
      </div>
    </section>

    <!-- MODULE 2 - FRIENDS -->
    <section class="module" id="module-friends">
      <div class="module-inner">
        <h2 class="module-title">Friends</h2>
        <p class="module-subtitle">People who are part of my journey.</p>

        <div class="friends-grid">
          <div class="friend-card">
            <div class="friend-avatar-wrap">
              <svg class="friend-ring-svg" viewBox="0 0 100 100">
                <rect class="friend-ring-track" x="3" y="3" width="94" height="94" rx="16" ry="16"/>
                <rect class="friend-ring-trace" x="3" y="3" width="94" height="94" rx="16" ry="16"/>
              </svg>

function toThumbUrlDash(url){
  return 'https://images.weserv.nl/?url=' + encodeURIComponent(url.replace(/^https?:\/\//,'')) + '&w=380&q=50&output=webp';
}

const galleryGrid = document.getElementById('galleryGrid');
const galleryTabs = document.querySelectorAll('.gallery-tab');
const galleryScroll = document.getElementById('galleryScroll');

function renderGalleryTab(cat){
  const items = GALLERY_DATA_DASH[cat] || [];
  galleryGrid.innerHTML = '';
  galleryScroll.scrollTop = 0;
  galleryGrid.classList.toggle('is-xatspace', cat === 'xatspace');

  if(items.length === 0){
    const empty = document.createElement('div');
    empty.className = 'gallery-empty';
    empty.textContent = 'Em breve.';
    galleryGrid.appendChild(empty);
    return;
  }

  if(cat === 'xatspace'){
    items.forEach(item=>{
      const el = document.createElement('div');
      el.className = 'xatspace-card';
      el.innerHTML = `
        <div class="xatspace-name">${item.name}</div>
        <a class="xatspace-view" href="${item.url}" target="_blank" rel="noopener">View</a>
      `;
      galleryGrid.appendChild(el);
    });
    return;
  }

  items.forEach(item=>{
    const el = document.createElement('div');
    el.className = 'gallery-item';
    el.dataset.full = item.url;
    el.innerHTML = `<img src="${toThumbUrlDash(item.url)}" alt="${item.name}" loading="lazy" decoding="async"><span class="gallery-item-label">${item.name}</span>`;
    el.addEventListener('click', ()=>{
      lightboxDashImg.src = item.url;
      lightboxDash.classList.add('open');
    });
    galleryGrid.appendChild(el);
  });
}

galleryTabs.forEach(tab=>{
  tab.addEventListener('click', ()=>{
    galleryTabs.forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    renderGalleryTab(tab.dataset.cat);
  });
});

document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape') lightboxDash.classList.remove('open');
});
