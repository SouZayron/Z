<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENIGM 4TICO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --neon: #44CE7D;
    --mint: #DAFFE9;
    --black: #050706;
    --graphite: #161B19;
    --white: #F3F6F4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    overflow:hidden;
    background:var(--black);
    font-family:'Rajdhani',sans-serif;
  }
  .stage{
    position:relative;
    width:100vw;
    height:100vh;
    aspect-ratio:16/9;
    margin:auto;
    overflow:hidden;
    background:
      radial-gradient(ellipse 70% 60% at 50% 45%, rgba(68,206,125,0.14) 0%, rgba(68,206,125,0) 60%),
      radial-gradient(ellipse 120% 90% at 50% 100%, rgba(68,206,125,0.10) 0%, rgba(0,0,0,0) 55%),
      linear-gradient(180deg, #04100A 0%, #050706 45%, #030403 100%);
  }

  /* ---------- GRID / HUD LAYER ---------- */
  .grid-layer{
    position:absolute; inset:-5%;
    background-image:
      linear-gradient(rgba(68,206,125,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(68,206,125,0.07) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 75% 75% at 50% 50%, black 30%, transparent 75%);
    animation: gridDrift 26s linear infinite;
    z-index:1;
  }
  @keyframes gridDrift{
    0%{ background-position: 0 0, 0 0; }
    100%{ background-position: 128px 64px, 64px 128px; }
  }

  .scanline{
    position:absolute; left:0; right:0; height:2px;
    background: linear-gradient(90deg, transparent, rgba(218,255,233,0.55), transparent);
    filter: blur(0.5px);
    z-index:2;
    animation: scan 7s ease-in-out infinite;
    opacity:0.5;
  }
  @keyframes scan{
    0%{ top:8%; opacity:0; }
    10%{ opacity:0.5; }
    50%{ top:92%; opacity:0.35; }
    90%{ opacity:0.5; }
    100%{ top:8%; opacity:0; }
  }

  /* corner HUD brackets (graphic only, no text) */
  .bracket{
    position:absolute; width:90px; height:90px; z-index:5;
    border: 2px solid rgba(218,255,233,0.55);
    filter: drop-shadow(0 0 6px rgba(68,206,125,0.6));
    opacity:0.75;
  }
  .bracket.tl{ top:4%; left:3%; border-right:none; border-bottom:none; }
  .bracket.tr{ top:4%; right:3%; border-left:none; border-bottom:none; }
  .bracket.bl{ bottom:4%; left:3%; border-right:none; border-top:none; }
  .bracket.br{ bottom:4%; right:3%; border-left:none; border-top:none; }

  .hud-bar{
    position:absolute; z-index:5;
    background: linear-gradient(90deg, rgba(68,206,125,0.05), rgba(68,206,125,0.55), rgba(68,206,125,0.05));
    height:3px; border-radius:2px;
    filter: drop-shadow(0 0 4px rgba(68,206,125,0.7));
    animation: pulseBar 3.2s ease-in-out infinite;
  }
  .hud-bar.b1{ top:6%; left:12%; width:120px; animation-delay:0s;}
  .hud-bar.b2{ top:9%; left:12%; width:60px; opacity:0.5; animation-delay:0.4s;}
  .hud-bar.b3{ top:6%; right:12%; width:120px; animation-delay:0.8s;}
  .hud-bar.b4{ bottom:8%; right:12%; width:80px; animation-delay:1.2s;}
  .hud-bar.b5{ bottom:8%; left:12%; width:100px; animation-delay:1.6s;}
  @keyframes pulseBar{
    0%,100%{ opacity:0.35; transform:scaleX(1); }
    50%{ opacity:1; transform:scaleX(1.06); }
  }

  .hud-dot{
    position:absolute; width:6px; height:6px; border-radius:50%;
    background: var(--neon);
    box-shadow:0 0 8px 2px rgba(68,206,125,0.8);
    animation: dotBlink 2.4s ease-in-out infinite;
    z-index:5;
  }

  /* ---------- HOLOGRAPHIC PANELS ---------- */
  .panel{
    position:absolute;
    border:1px solid rgba(218,255,233,0.25);
    background: linear-gradient(135deg, rgba(68,206,125,0.10), rgba(218,255,233,0.03));
    backdrop-filter: blur(6px);
    box-shadow: 0 0 30px rgba(68,206,125,0.08) inset;
    z-index:3;
  }
  .panel.p1{ width:220px; height:130px; top:10%; left:6%; transform:skew(-6deg,-2deg) rotate(-4deg); opacity:0.22; }
  .panel.p2{ width:180px; height:100px; bottom:14%; right:8%; transform:skew(5deg,2deg) rotate(3deg); opacity:0.18; }
  .panel.p3{ width:140px; height:220px; top:20%; right:4%; transform:skew(0deg,-4deg) rotate(6deg); opacity:0.15; }

  /* ---------- FLOATING PARTICLES ---------- */
  .particles{ position:absolute; inset:0; z-index:4; pointer-events:none; }
  .particle{
    position:absolute; border-radius:50%;
    background: radial-gradient(circle, var(--mint) 0%, var(--neon) 60%, transparent 100%);
    opacity:0.7;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    10%{ opacity:0.8; }
    90%{ opacity:0.5; }
    100%{ transform:translateY(-90vh) translateX(20px); opacity:0; }
  }

  /* ---------- LETTERING ---------- */
  .lettering{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    gap: clamp(2rem, 8vw, 9rem);
    z-index:6;
    pointer-events:none;
    overflow:hidden;
  }
  .word{
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:0.03em;
    font-size:clamp(2.2rem, 8vw, 7rem);
    line-height:1;
    color: rgba(218,255,233,0.16);
    -webkit-text-stroke: 1.5px rgba(218,255,233,0.35);
    text-shadow:
      0 0 18px rgba(68,206,125,0.55),
      0 0 46px rgba(68,206,125,0.35),
      0 0 90px rgba(68,206,125,0.18);
    filter: blur(0.3px);
    white-space:nowrap;
    animation: breathe 5s ease-in-out infinite;
  }
  .word.left{ transform: translateX(0); }
  .word.right{ transform: translateX(0); }
  @keyframes breathe{
    0%,100%{ filter: blur(0.3px) brightness(1); }
    50%{ filter: blur(0.6px) brightness(1.25); }
  }

  /* ---------- PHOTO ---------- */
  .photo-wrap{
    position:absolute;
    top:50%; left:50%;
    width:auto;
    max-width:55%;
    max-height:78vh;
    transform: translate(-50%,-46%);
    z-index:7;
  }
  .photo-mask{
    position:relative;
    width:auto;
    line-height:0;
    -webkit-mask-image: radial-gradient(ellipse 82% 88% at 50% 42%, black 62%, transparent 100%);
    mask-image: radial-gradient(ellipse 82% 88% at 50% 42%, black 62%, transparent 100%);
  }
  .photo-mask img{
    width:auto; height:auto;
    max-width:100%; max-height:78vh;
    object-fit:contain;
    display:block;
  }

  /* fine grain / vignette overlay */
  .vignette{
    position:absolute; inset:0; z-index:9; pointer-events:none;
    background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 55%, rgba(0,0,0,0.65) 100%);
  }
  .smoke{
    position:absolute; inset:0; z-index:5; pointer-events:none;
    background: radial-gradient(ellipse 60% 30% at 30% 85%, rgba(218,255,233,0.05), transparent 70%),
                radial-gradient(ellipse 50% 25% at 75% 90%, rgba(68,206,125,0.06), transparent 70%);
    animation: smokeDrift 12s ease-in-out infinite;
  }
  @keyframes smokeDrift{
    0%,100%{ transform:translateX(0); opacity:0.8;}
    50%{ transform:translateX(30px); opacity:1;}
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }

  /* ---------- NAV ---------- */
  .nav{
    position:absolute; top:10%; left:0; right:0;
    z-index:20;
    display:flex; align-items:center; justify-content:center;
    padding:2.4vh 0 0 0;
    pointer-events:none;
  }
  .nav-inner{
    pointer-events:all;
    display:flex; align-items:center; gap:clamp(1.8rem, 3vw, 3.2rem);
    padding: 0.8rem 2.4rem;
    border:1px solid rgba(218,255,233,0.25);
    background: rgba(10,16,13,0.45);
    backdrop-filter: blur(14px);
    border-radius:999px;
    box-shadow: 0 0 24px rgba(68,206,125,0.12), 0 0 0 1px rgba(68,206,125,0.05) inset;
  }
  .nav-item{
    font-family:'Rajdhani',sans-serif;
    font-weight:600;
    letter-spacing:0.22em;
    text-transform:uppercase;
    font-size:0.9rem;
    color: var(--mint);
    text-decoration:none;
    background:none;
    border:none;
    cursor:pointer;
    position:relative;
    padding:0.3rem 0.1rem;
    opacity:0.85;
    transition: opacity .3s ease, text-shadow .3s ease;
  }
  .nav-item::after{
    content:'';
    position:absolute; left:0; bottom:-6px;
    width:0%; height:1.5px;
    background: var(--neon);
    box-shadow:0 0 8px rgba(68,206,125,0.9);
    transition: width .35s ease;
  }
  .nav-item:hover, .nav-item.active{
    opacity:1;
    text-shadow: 0 0 12px rgba(68,206,125,0.85);
  }
  .nav-item:hover::after, .nav-item.active::after{ width:100%; }
  .nav-dot{
    width:5px; height:5px; border-radius:50%;
    background: var(--neon);
    box-shadow:0 0 6px 2px rgba(68,206,125,0.8);
    opacity:0.7;
  }

  /* ---------- GALERIA OVERLAY ---------- */
  .gallery-overlay{
    position:absolute; inset:0; z-index:50;
    display:flex; align-items:center; justify-content:center;
    background: rgba(3,6,4,0.55);
    backdrop-filter: blur(22px) saturate(120%);
    -webkit-backdrop-filter: blur(22px) saturate(120%);
    opacity:0; pointer-events:none;
    transition: opacity .5s ease;
  }
  .gallery-overlay.open{
    opacity:1; pointer-events:all;
  }
  .gallery-panel{
    width:min(1200px, 84%);
    transform: translateY(14px) scale(0.98);
    opacity:0;
    transition: transform .5s ease, opacity .5s ease;
    text-align:center;
  }
  .gallery-overlay.open .gallery-panel{
    transform: translateY(0) scale(1);
    opacity:1;
  }
  .gallery-eyebrow{
    font-family:'Orbitron', sans-serif;
    font-weight:800;
    letter-spacing:0.3em;
    text-transform:uppercase;
    font-size:0.85rem;
    color: var(--neon);
    text-shadow:0 0 14px rgba(68,206,125,0.7);
    margin-bottom: clamp(1.2rem, 3vh, 2.4rem);
  }
  .gallery-grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(0.9rem, 1.6vw, 1.6rem);
  }
  .gallery-card{
    position:relative;
    padding: clamp(1.6rem,3vh,2.6rem) 1rem;
    border:1px solid rgba(218,255,233,0.22);
    background: linear-gradient(160deg, rgba(68,206,125,0.10), rgba(218,255,233,0.02));
    border-radius:14px;
    cursor:pointer;
    overflow:hidden;
    transition: transform .3s ease, border-color .3s ease, box-shadow .3s ease;
  }
  .gallery-card::before{
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(circle at 50% 0%, rgba(68,206,125,0.35), transparent 65%);
    opacity:0;
    transition: opacity .35s ease;
  }
  .gallery-card:hover{
    transform: translateY(-6px);
    border-color: rgba(68,206,125,0.75);
    box-shadow: 0 0 30px rgba(68,206,125,0.28);
  }
  .gallery-card:hover::before{ opacity:1; }
  .gallery-card-label{
    position:relative; z-index:1;
    font-family:'Orbitron', sans-serif;
    font-weight:700;
    letter-spacing:0.12em;
    text-transform:uppercase;
    font-size:clamp(0.95rem, 1.3vw, 1.15rem);
    color: var(--white);
  }
  .gallery-close{
    position:absolute; top:22px; right:26px;
    width:38px; height:38px;
    border:1px solid rgba(218,255,233,0.35);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; background:rgba(10,16,13,0.4);
    color:var(--mint);
    font-family:'Rajdhani',sans-serif; font-size:1.1rem;
    transition: box-shadow .3s ease, transform .3s ease;
  }
  .gallery-close:hover{ box-shadow:0 0 16px rgba(68,206,125,0.6); transform: rotate(90deg); }

  /* ---------- CATEGORY (THUMBNAIL) VIEW ---------- */
  .cat-overlay{
    position:absolute; inset:0; z-index:60;
    background: rgba(2,5,3,0.72);
    backdrop-filter: blur(18px) saturate(115%);
    -webkit-backdrop-filter: blur(18px) saturate(115%);
    opacity:0; pointer-events:none;
    transition: opacity .45s ease;
    display:flex; flex-direction:column;
    padding: clamp(1.6rem,4vh,3.2rem) clamp(1.6rem,5vw,4.5rem);
  }
  .cat-overlay.open{ opacity:1; pointer-events:all; }
  .cat-header{
    display:flex; align-items:center; justify-content:center;
    position:relative;
    margin-bottom: clamp(1.2rem, 2.4vh, 2rem);
    flex:0 0 auto;
  }
  .cat-title{
    font-family:'Orbitron', sans-serif;
    font-weight:800;
    letter-spacing:0.28em;
    text-transform:uppercase;
    font-size:clamp(1.1rem, 2vw, 1.6rem);
    color: var(--mint);
    text-shadow:0 0 16px rgba(68,206,125,0.7);
  }
  .cat-back{
    position:absolute; left:0;
    display:flex; align-items:center; gap:0.5rem;
    font-family:'Rajdhani',sans-serif;
    font-weight:600; letter-spacing:0.15em; text-transform:uppercase;
    font-size:0.85rem;
    color:var(--mint); opacity:0.85;
    cursor:pointer; background:none; border:none;
  }
  .cat-back:hover{ opacity:1; text-shadow:0 0 10px rgba(68,206,125,0.8); }
  .cat-close{
    position:absolute; right:0;
    width:38px; height:38px;
    border:1px solid rgba(218,255,233,0.35);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; background:rgba(10,16,13,0.4);
    color:var(--mint);
    transition: box-shadow .3s ease, transform .3s ease;
  }
  .cat-close:hover{ box-shadow:0 0 16px rgba(68,206,125,0.6); transform: rotate(90deg); }

  .cat-grid-wrap{
    flex:1 1 auto;
    overflow-y:auto;
    padding-right:0.4rem;
  }
  .cat-grid-wrap::-webkit-scrollbar{ width:6px; }
  .cat-grid-wrap::-webkit-scrollbar-thumb{ background: rgba(68,206,125,0.4); border-radius:4px; }
  .cat-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: clamp(0.7rem, 1.1vw, 1.1rem);
  }
  .thumb{
    position:relative;
    aspect-ratio: 4 / 3;
    border-radius:10px;
    overflow:hidden;
    border:1px solid rgba(218,255,233,0.18);
    cursor:pointer;
    background: rgba(255,255,255,0.02);
    transition: border-color .3s ease, box-shadow .3s ease, transform .3s ease;
    content-visibility:auto;
    contain-intrinsic-size: 220px 165px;
  }
  .thumb img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    transition: transform .4s ease, filter .4s ease;
  }
  .thumb::after{
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.55) 100%);
    opacity:0.7;
    transition: opacity .3s ease;
  }
  .thumb:hover{
    border-color: rgba(68,206,125,0.75);
    box-shadow:0 0 18px rgba(68,206,125,0.35);
    transform: translateY(-3px);
  }
  .thumb:hover img{ transform: scale(1.08); filter:brightness(1.05); }
  .thumb-label{
    position:absolute; left:8px; bottom:6px; z-index:1;
    font-family:'Rajdhani',sans-serif;
    font-weight:600; letter-spacing:0.06em;
    font-size:0.72rem; text-transform:uppercase;
    color: var(--white);
    text-shadow:0 0 6px rgba(0,0,0,0.8);
  }

  /* ---------- LIGHTBOX (tamanho real) ---------- */
  .lightbox{
    position:absolute; inset:0; z-index:80;
    background: rgba(1,3,2,0.88);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition: opacity .35s ease;
  }
  .lightbox.open{ opacity:1; pointer-events:all; }
  .lightbox img{
    max-width:88vw; max-height:82vh;
    width:auto; height:auto;
    border-radius:8px;
    box-shadow: 0 0 40px rgba(68,206,125,0.35), 0 0 0 1px rgba(218,255,233,0.2);
    transform: scale(0.96);
    transition: transform .35s ease;
  }
  .lightbox.open img{ transform: scale(1); }
  .lightbox-caption{
    position:absolute; bottom:6%; left:50%; transform:translateX(-50%);
    font-family:'Rajdhani',sans-serif;
    letter-spacing:0.12em; text-transform:uppercase;
    font-size:0.85rem; color:var(--mint); opacity:0.85;
  }
  .lightbox-close{
    position:absolute; top:4%; right:4%;
    width:42px; height:42px;
    border:1px solid rgba(218,255,233,0.35);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; background:rgba(10,16,13,0.5);
    color:var(--mint);
    transition: box-shadow .3s ease, transform .3s ease;
  }
  .lightbox-close:hover{ box-shadow:0 0 16px rgba(68,206,125,0.6); transform: rotate(90deg); }
</style>
</head>
<body>

<div class="stage" id="stage">

  <nav class="nav">
    <div class="nav-inner">
      <a href="#" class="nav-item active" data-view="home">Home</a>
      <span class="nav-dot"></span>
      <button type="button" class="nav-item" id="galeriaBtn" data-view="galeria">Galeria</button>
      <span class="nav-dot"></span>
      <a href="#contato" class="nav-item" data-view="contato">Contato</a>
    </div>
  </nav>

  <div class="grid-layer" data-depth="0.02"></div>
  <div class="smoke"></div>

  <div class="panel p1" data-depth="0.04"></div>
  <div class="panel p2" data-depth="0.05"></div>
  <div class="panel p3" data-depth="0.03"></div>

  <div class="particles" id="particles"></div>

  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>
  <div class="hud-bar b1"></div>
  <div class="hud-bar b2"></div>
  <div class="hud-bar b3"></div>
  <div class="hud-bar b4"></div>
  <div class="hud-bar b5"></div>

  <div class="scanline"></div>

  <div class="lettering" data-depth="0.015">
    <span class="word left">ENIGM</span>
    <span class="word right">4TICO</span>
  </div>


  <div class="photo-wrap" data-depth="0.06">
    <div class="photo-mask">
      <img src="https://xatimg.com/image/yT4H94ItRnGh.png" alt="ENIGM 4TICO">
    </div>
  </div>

  <div class="vignette"></div>

  <div class="gallery-overlay" id="galleryOverlay">
    <div class="gallery-panel">
      <div class="gallery-eyebrow">Galeria</div>
      <div class="gallery-grid">
        <div class="gallery-card" data-cat="fundos"><div class="gallery-card-label">Fundos</div></div>
        <div class="gallery-card" data-cat="pcbacks"><div class="gallery-card-label">Pcbacks</div></div>
        <div class="gallery-card" data-cat="pstyle"><div class="gallery-card-label">Pstyle</div></div>
        <div class="gallery-card" data-cat="xatspaces"><div class="gallery-card-label">Xatspaces</div></div>
      </div>
    </div>
    <div class="gallery-close" id="galleryClose">✕</div>
  </div>

  <div class="cat-overlay" id="catOverlay">
    <div class="cat-header">
      <button type="button" class="cat-back" id="catBack">‹ Voltar</button>
      <div class="cat-title" id="catTitle">Fundos</div>
      <div class="cat-close" id="catClose">✕</div>
    </div>
    <div class="cat-grid-wrap">
      <div class="cat-grid" id="catGrid"></div>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>
</div>

<script>
  // random HUD dots
  const stage = document.getElementById('stage');
  for(let i=0;i<10;i++){
    const d = document.createElement('div');
    d.className = 'hud-dot';
    d.style.left = (5 + Math.random()*90) + '%';
    d.style.top = (5 + Math.random()*90) + '%';
    d.style.animationDelay = (Math.random()*2.4) + 's';
    stage.appendChild(d);
  }

  // floating particles
  const pField = document.getElementById('particles');
  const N = 34;
  for(let i=0;i<N;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random()*3.5;
    p.style.width = size+'px';
    p.style.height = size+'px';
    p.style.left = Math.random()*100 + '%';
    p.style.bottom = (-5 - Math.random()*10) + '%';
    const dur = 8 + Math.random()*10;
    p.style.animationDuration = dur+'s';
    p.style.animationDelay = (Math.random()*dur) + 's';
    pField.appendChild(p);
  }

  // ---------- DADOS DA GALERIA ----------
  // Miniaturas passam por proxy de imagem com 50% de qualidade e largura reduzida
  // (deixa a galeria mais leve); o lightbox sempre usa a imagem original em qualidade cheia.
  function toThumbUrl(url){

  const CAT_LABELS = { fundos:'Fundos', pcbacks:'Pcbacks', pstyle:'Pstyle', xatspaces:'Xatspaces' };

  const catOverlay = document.getElementById('catOverlay');
  const catTitle = document.getElementById('catTitle');
  const catGrid = document.getElementById('catGrid');
  const catBack = document.getElementById('catBack');
  const catClose = document.getElementById('catClose');

  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxCaption = document.getElementById('lightboxCaption');
  const lightboxClose = document.getElementById('lightboxClose');

  function openCategory(cat){
    const items = GALLERY_DATA[cat] || [];
    catTitle.textContent = CAT_LABELS[cat] || cat;
    catGrid.innerHTML = '';
    if(items.length === 0){
      const empty = document.createElement('div');
      empty.style.gridColumn = '1 / -1';
      empty.style.textAlign = 'center';
      empty.style.color = 'rgba(218,255,233,0.6)';
      empty.style.fontFamily = "'Rajdhani',sans-serif";
      empty.style.letterSpacing = '0.1em';
      empty.style.padding = '2rem 0';
      empty.textContent = 'Em breve.';
      catGrid.appendChild(empty);
    } else {
      items.forEach(item=>{
        const t = document.createElement('div');
        t.className = 'thumb';
        t.innerHTML = `<img src="${toThumbUrl(item.url)}" alt="${item.name}" loading="lazy" decoding="async"><span class="thumb-label">${item.name}</span>`;
        t.addEventListener('click', ()=> openLightbox(item));
        catGrid.appendChild(t);
      });
    }
    galleryOverlay.classList.remove('open');
    catOverlay.classList.add('open');
  }
  function closeCategory(){
    catOverlay.classList.remove('open');
  }
  function backToGallery(){
    catOverlay.classList.remove('open');
    galleryOverlay.classList.add('open');
  }
  function openLightbox(item){
    lightboxImg.src = item.url;
    lightboxImg.alt = item.name;
    lightboxCaption.textContent = item.name;
    lightbox.classList.add('open');
  }
  function closeLightbox(){
    lightbox.classList.remove('open');
  }

  document.querySelectorAll('.gallery-card').forEach(card=>{
    card.addEventListener('click', ()=> openCategory(card.dataset.cat));
  });
  catBack.addEventListener('click', backToGallery);
  catClose.addEventListener('click', ()=>{
    closeCategory();
    document.querySelector('.nav-item[data-view="home"]').classList.add('active');
    document.getElementById('galeriaBtn').classList.remove('active');
  });
  catOverlay.addEventListener('click', (e)=>{ if(e.target === catOverlay) closeCategory(); });
  lightboxClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e)=>{ if(e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape'){
      if(lightbox.classList.contains('open')) closeLightbox();
      else if(catOverlay.classList.contains('open')) closeCategory();
    }
  });

  // galeria overlay
  const galeriaBtn = document.getElementById('galeriaBtn');
  const galleryOverlay = document.getElementById('galleryOverlay');
  const galleryClose = document.getElementById('galleryClose');
  const navItems = document.querySelectorAll('.nav-item');

  function openGallery(){
    galleryOverlay.classList.add('open');
    navItems.forEach(n=>n.classList.remove('active'));
    galeriaBtn.classList.add('active');
  }
  function closeGallery(){
    galleryOverlay.classList.remove('open');
    navItems.forEach(n=>n.classList.remove('active'));
    document.querySelector('.nav-item[data-view="home"]').classList.add('active');
  }
  galeriaBtn.addEventListener('click', (e)=>{
    e.preventDefault();
    galleryOverlay.classList.contains('open') ? closeGallery() : openGallery();
  });
  galleryClose.addEventListener('click', closeGallery);
  galleryOverlay.addEventListener('click', (e)=>{
    if(e.target === galleryOverlay) closeGallery();
  });
  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape') closeGallery();
  });
  document.querySelector('.nav-item[data-view="home"]').addEventListener('click', (e)=>{
    e.preventDefault();
    closeGallery();
  });
  document.querySelector('.nav-item[data-view="contato"]').addEventListener('click', ()=>{
    navItems.forEach(n=>n.classList.remove('active'));
    document.querySelector('.nav-item[data-view="contato"]').classList.add('active');
    closeGallery();
  });

  // mouse parallax
  const depthEls = document.querySelectorAll('[data-depth]');
  window.addEventListener('mousemove', (e)=>{
    const cx = (e.clientX / window.innerWidth - 0.5);
    const cy = (e.clientY / window.innerHeight - 0.5);
    depthEls.forEach(el=>{
      const depth = parseFloat(el.dataset.depth);
      const tx = cx * depth * 300;
      const ty = cy * depth * 300;
      if(el.classList.contains('photo-wrap')){
        el.style.transform = `translate(calc(-50% + ${tx}px), calc(-46% + ${ty}px))`;
      } else {
        el.style.transform = `translate(${tx}px, ${ty}px)`;
      }
    });
  });
